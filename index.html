<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#1e293b;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
}

h1{
    color:white;
    margin-bottom:20px;
}

.board{
    display:grid;
    grid-template-columns:repeat(3,100px);
    grid-template-rows:repeat(3,100px);
    gap:5px;
    justify-content:center;
}

.cell{
    background:white;
    border:none;
    font-size:40px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.cell:hover{
    background:#dbeafe;
}

#status{
    margin-top:20px;
    color:white;
    font-size:22px;
}

button{
    margin-top:20px;
    padding:10px 20px;
    font-size:18px;
    border:none;
    border-radius:5px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}
</style>

</head>
<body>

<div class="container">

<h1>Tic Tac Toe</h1>

<div class="board">

<button class="cell"></button>
<button class="cell"></button>
<button class="cell"></button>

<button class="cell"></button>
<button class="cell"></button>
<button class="cell"></button>

<button class="cell"></button>
<button class="cell"></button>
<button class="cell"></button>

</div>

<div id="status">Player X's Turn</div>

<button onclick="restartGame()">Restart Game</button>

</div>

<script>

const cells=document.querySelectorAll(".cell");
const status=document.getElementById("status");

let currentPlayer="X";
let gameActive=true;

let board=[
"","","",
"","","",
"","",""
];

const winningConditions=[
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
];

cells.forEach((cell,index)=>{
    cell.addEventListener("click",()=>{
        cellClicked(index);
    });
});

function cellClicked(index){

    if(board[index]!="" || !gameActive)
        return;

    board[index]=currentPlayer;
    cells[index].textContent=currentPlayer;

    checkWinner();
}

function checkWinner(){

    let winner=false;

    for(let condition of winningConditions){

        let a=board[condition[0]];
        let b=board[condition[1]];
        let c=board[condition[2]];

        if(a=="" || b=="" || c=="")
            continue;

        if(a===b && b===c){
            winner=true;
            break;
        }
    }

    if(winner){
        status.textContent="Player "+currentPlayer+" Wins!";
        gameActive=false;
        return;
    }

    if(!board.includes("")){
        status.textContent="Game Draw!";
        gameActive=false;
        return;
    }

    currentPlayer=currentPlayer==="X"?"O":"X";
    status.textContent="Player "+currentPlayer+"'s Turn";
}

function restartGame(){

    board=[
    "","","",
    "","","",
    "","",""
    ];

    currentPlayer="X";
    gameActive=true;

    cells.forEach(cell=>{
        cell.textContent="";
    });

    status.textContent="Player X's Turn";
}

</script>

</body>
</html>
